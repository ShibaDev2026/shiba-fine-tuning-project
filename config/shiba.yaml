# shiba-fine-tuning-project 全專案唯一 source of truth
# 所有相對路徑以「本檔案所在專案根」為基準，載入時自動轉絕對路徑
# 呼叫方統一入口：from shiba_config import CONFIG
#
# 禁止在程式碼硬寫：DB 路徑、~/.local-brain、Ollama URL、Layer 3 URL
# 新增 key 前先確認是否真屬「全專案共用」才加入

# ----------------------------------------------------------------
# 路徑（相對專案根，程式載入時轉絕對）
# ----------------------------------------------------------------
paths:
  db: data/shiba-brain.db                 # SQLite 主檔（Layer 1/2/3 共用）
  logs_dir: data/logs                     # hook/layer 日誌
  queue_dir: data/queue                   # Layer 1 hook 排隊目錄
  backups_dir: backups                    # scripts/db_backup.sh 輸出
  external_dataset: data/external_dataset # Layer 2 通用指令集（Alpaca 等）

# ----------------------------------------------------------------
# 服務 port 與 URL
# ----------------------------------------------------------------
services:
  backend_port: 8000                      # Layer 2 FastAPI（compose 內）
  frontend_port: 9590                     # Nginx 對外唯一入口
  layer3_port: 8001                       # Layer 3 launchd FastAPI（host）

  # Ollama / Layer 3 URL：host 與 docker 兩組，載入時依 SHIBA_RUNTIME 擇一
  ollama_base_url_host: http://localhost:11434
  ollama_base_url_docker: http://host.docker.internal:11434
  layer3_base_url_host: http://localhost:8001
  layer3_base_url_docker: http://host.docker.internal:8001

# ----------------------------------------------------------------
# Runtime（由環境變數決定執行環境）
# ----------------------------------------------------------------
runtime:
  # container 內由 docker-compose 設 SHIBA_RUNTIME=docker
  # host 未設時預設 'host'
  environment_var: SHIBA_RUNTIME

# ----------------------------------------------------------------
# Feature Flags（PR-O-1 立案；後續 PR 依序接線）
# 預設全 false = 最小核心閉環（Hook → Bridge → Score → Trigger → Update）
# 任一 flag 翻為 true 時，由 core.feature_registry.apply_features 套用
# 對應 modules/<topic>/db/<topic>.sql 並執行 init_fn
# ----------------------------------------------------------------
# Feature flags（PR-O 系列拆出）
#
# 開關位置：core.feature_registry.apply_features 啟動時讀；
# 各 flag 對應 modules/<name>/__init__.py 註冊的 FeatureSpec.flag。
# 所有 flag 預設 false → 核心 4-layer 路徑為唯一可行路線；任一 flag on 才掛 hook/建表。
#
# 依賴鏈（registry 強制 fail-fast，違反即拋 ValueError）：
#   shadow_gatekeeper   →  golden_retention      （shadow_gatekeeper 子能力）
#   ragas_eval          →  multi_judge_v2        （ragas Layer 2 報告讀 agreement_logs）
#
# 細節：
#   - shadow_gatekeeper：modules/gatekeeper；建 gatekeeper_golden_samples；註冊 "gate" hook
#   - ebbinghaus_trigger：modules/ebbinghaus_trigger；註冊 "trigger" hook（off=固定 approved≥30）
#   - ragas_eval：modules/ragas；建 ragas_evaluation_results / ragas_retrieval_golden_set
#   - multi_judge_v2：modules/multi_judge_v2；建 multi_judge_v2_agreement_logs；註冊 "judge_score" hook
#   - paraphrase_service：modules/paraphrase；註冊 "paraphrase" hook（off=排程 tick noop）
#   - advanced_compressor：modules/advanced_compressor；註冊 "compress_context" hook（off=截斷）
#   - golden_retention：modules/gatekeeper 子能力；不獨立載入，僅作為依賴閘
# ----------------------------------------------------------------
features:
  shadow_gatekeeper:   false   # Layer 3 A/B 守門；必須與 golden_retention 同時 true
  ebbinghaus_trigger:  false   # Layer 3 動態觸發；false=固定 approved≥30
  ragas_eval:          false   # 整套 RAGAS 評估框架（含 weekly CI launchd）；依賴 multi_judge_v2
  multi_judge_v2:      false   # false=三方多數投票無 log；true=vendor 強制+Fleiss+log
  paraphrase_service:  false   # false=background paraphrase 排程 tick noop
  advanced_compressor: false   # false=Layer 0 直接 truncate，不走 Gemma 壓縮
  golden_retention:    false   # shadow_gatekeeper 子能力；registry 強制檢核共開
