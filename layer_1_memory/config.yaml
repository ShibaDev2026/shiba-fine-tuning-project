# Layer 1 記憶層 — Layer 1 專屬邏輯參數
#
# 跨 layer 共用的路徑（DB / logs / queue）由 config/shiba.yaml 提供，
# 程式從 shiba_config.CONFIG 讀取。本檔只保留 Layer 1 獨用的調參。

# ============================================================
# RAG 設定
# ============================================================
rag:
  top_n: 3                  # 每次召回最多幾筆歷史記憶
  token_budget: 500         # 召回字串最大 token 數
  # Option 3（2026-06-20 Shiba 決策「RAG 改為使用者參考、不餵我」）：
  feed_model: false         # false=本地召回 + Layer 0 router 草擬結果「不」注入 Claude context（避免在 Shiba 看不見處混入 Claude 回答）；true=回復舊行為（注入 model context，Layer 0 本地接管才會生效）。可回滾旁路。
  # 使用者參考通道（2026-06-20 二改）：Claude Code 2.x 起 exit-0 hook 的 stderr 只進 debug log、UI/transcript 皆不顯示（官方文件），
  # 故 echo 由「stderr ANSI 區塊」改為「寫檔」——hook 把召回覆寫到 echo_file，Shiba 側邊 `tail -F` 查看（不進 model、不依賴 Claude Code UI、跨改版穩定）。
  echo_to_file: true        # true=每次召回覆寫 echo_file 給 Shiba 看（exit0、不進 model context、不消 token）。⚠ 寫檔前已過 scrub_for_export（IP/email/user handle 脫敏）；key/token 不在 scrub 範圍（罕見於記憶；若曾在對話貼過原始 key 仍可能顯示），echo_file 落在 .remember/（git 已 ignore）僅單機自用；要更嚴設 false
  echo_file: .remember/rag_echo.md  # 召回覆寫目標（相對專案根；.remember/.gitignore=* 不入版控；statusLine 解析首行 rag_count）

# ============================================================
# Logging 設定（log 檔路徑由 CONFIG.paths.logs_dir 提供，此處只設 level）
# ============================================================
logging:
  level: INFO

# ============================================================
# 記憶衰減設定（Phase 7 啟用邏輯，此處預留）
# 參數說明：
#   lambda_base       - 衰減速率（越小越慢，建議 0.05~0.08）
#   protection_days   - 新記憶的保護期（天），期間不衰減
#   frequency_exp     - 頻率強化指數（log(1+count)^exp，建議 0.7）
#   hit_multiplier    - RAG 命中時的 boost 倍率（建議 1.5~2.0）
#   archive_threshold - decay_score 低於此值時歸檔（建議 0.2）
#   archive_trigger   - active branches 超過此數量時觸發歸檔
# ============================================================
decay:
  enabled: false            # Phase 1 關閉，Phase 7 開啟
  lambda_base: 0.06
  protection_days: 7
  frequency_exp: 0.7
  hit_multiplier: 1.8
  archive_threshold: 0.2
  archive_trigger: 500

# ============================================================
# event_type 初始重要性（Phase 7 initial_importance 欄位用）
# ============================================================
event_importance:
  architecture: 1.1
  fine_tuning_ops: 1.1
  debugging: 1.0
  code_gen: 1.0
  git_ops: 0.9
  terminal_ops: 0.9
  knowledge_qa: 0.9
